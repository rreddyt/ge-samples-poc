# ⚙️ UKG Pro Integration Server PoC Environment Variables
# This file is used by gcloud run deploy --env-vars-file=env.yaml to load configurations.

# GCP Project and BigQuery Config
GOOGLE_CLOUD_PROJECT: "vr-payg-nonprod"
BQ_DATASET: "vr-payg-nonprod.ukg_mock_data"

# UKG API Configurations
# Note: UKG_API_BASE_URL is dynamically populated with the Mock REST API service URL during deployment.
UKG_API_BASE_URL: "https://mock-ukg-rest-api-placeholder"
UKG_API_KEY: "mock-auth-token-123"
